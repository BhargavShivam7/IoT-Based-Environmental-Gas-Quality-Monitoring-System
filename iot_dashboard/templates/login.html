<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - AetherSense</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-950 text-white flex items-center justify-center h-screen">
    <div class="bg-gray-900 p-8 rounded-2xl shadow-2xl w-96 border border-gray-800">
        <h2 class="text-2xl font-bold mb-6 text-center text-cyan-400">Welcome Back</h2>
        {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="bg-blue-500/20 border border-blue-500/50 text-blue-400 p-2 rounded mb-4 text-sm text-center">{{ messages[0] }}</div>
        {% endif %}
        {% endwith %}
        <form method="POST" action="/login">
            <div class="mb-4">
                <label class="block text-gray-400 text-xs font-bold mb-2 uppercase">Email Address</label>
                <input type="email" name="email" required class="w-full p-2 rounded bg-gray-800 text-white border border-gray-700 focus:outline-none focus:border-cyan-500">
            </div>
            <div class="mb-6">
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-gray-400 text-xs font-bold uppercase">Password</label>
                    <a href="/forgot_password" class="text-xs text-cyan-400 hover:text-cyan-300">Forgot Password?</a>
                </div>
                <input type="password" name="password" required class="w-full p-2 rounded bg-gray-800 text-white border border-gray-700 focus:outline-none focus:border-cyan-500">
            </div>
            <button type="submit" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-2 px-4 rounded transition">Login</button>
        </form>
        <p class="mt-4 text-center text-gray-400 text-sm">New here? <a href="/signup" class="text-cyan-400 hover:text-cyan-300">Create Account</a></p>
    </div>
</body>
</html>
