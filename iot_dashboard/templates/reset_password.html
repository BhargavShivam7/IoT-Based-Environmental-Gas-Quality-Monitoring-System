<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Set New Password - AetherSense</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-950 text-white flex items-center justify-center h-screen">
    <div class="bg-gray-900 p-8 rounded-2xl shadow-2xl w-96 border border-gray-800">
        <h2 class="text-xl font-bold mb-6 text-center text-cyan-400">Set New Password</h2>
        <form method="POST">
            <div class="mb-6">
                <label class="block text-gray-400 text-xs font-bold mb-2 uppercase">New Password</label>
                <input type="password" name="password" required class="w-full p-2 rounded bg-gray-800 text-white border border-gray-700 focus:outline-none focus:border-cyan-500">
            </div>
            <button type="submit" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-2 px-4 rounded transition">Update Password</button>
        </form>
    </div>
</body>
</html>
