<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings - AetherSense Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-950 text-white h-screen flex flex-col">

    <nav class="bg-gray-900 border-b border-gray-800 h-16 flex-none">
        <div class="container mx-auto px-6 h-full flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="ph-fill ph-circles-three-plus text-cyan-400 text-2xl"></i>
                <a href="/" class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-blue-500">AetherSense</a>
            </div>
            <a href="/" class="text-sm bg-gray-800 hover:bg-gray-700 text-gray-300 px-4 py-2 rounded-lg transition border border-gray-700"><i class="ph-bold ph-arrow-left"></i> Back to Dashboard</a>
        </div>
    </nav>

    <main class="flex-1 overflow-y-auto p-6 md:p-10 flex justify-center">
        <div class="w-full max-w-2xl">
            <h2 class="text-3xl font-bold mb-8 flex items-center gap-3"><i class="ph-duotone ph-gear"></i> Account Settings</h2>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="bg-green-500/20 border border-green-500/50 text-green-400 p-3 rounded-lg mb-6 text-sm">{{ messages[0][1] }}</div>
            {% endif %}
            {% endwith %}

            <div class="bg-gray-900 rounded-2xl border border-gray-800 p-6 shadow-2xl">
                <form action="/settings" method="POST" class="space-y-6">
                    
                    <div>
                        <h3 class="text-lg font-bold text-gray-300 mb-4 border-b border-gray-800 pb-2">Profile</h3>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] text-gray-500 uppercase font-bold">Username</label>
                                <input type="text" value="{{ user.username }}" disabled class="w-full bg-gray-950 border border-gray-800 rounded p-2 text-sm text-gray-400 cursor-not-allowed">
                            </div>
                            <div>
                                <label class="text-[10px] text-gray-500 uppercase font-bold">Account Email</label>
                                <input type="text" value="{{ user.email }}" disabled class="w-full bg-gray-950 border border-gray-800 rounded p-2 text-sm text-gray-400 cursor-not-allowed">
                            </div>
                        </div>
                    </div>

                    <div>
                        <h3 class="text-lg font-bold text-gray-300 mb-4 border-b border-gray-800 pb-2">Alert Preferences</h3>
                        <div>
                            <label class="text-[10px] text-gray-400 uppercase font-bold">Send Emergency Alerts To:</label>
                            <input type="email" name="alert_email" value="{{ user.alert_email or '' }}" class="w-full bg-gray-800 border border-gray-700 rounded p-2 text-sm text-white focus:border-cyan-500 focus:outline-none">
                            <p class="text-xs text-gray-500 mt-1">If empty, you will not receive smoke or heat warnings.</p>
                        </div>
                    </div>

                    <div>
                        <h3 class="text-lg font-bold text-gray-300 mb-4 border-b border-gray-800 pb-2">Security</h3>
                        <div>
                            <label class="text-[10px] text-gray-400 uppercase font-bold">New Password</label>
                            <input type="password" name="new_password" placeholder="Leave blank to keep current password" class="w-full bg-gray-800 border border-gray-700 rounded p-2 text-sm text-white focus:border-cyan-500 focus:outline-none">
                        </div>
                    </div>

                    <div class="pt-4 border-t border-gray-800 flex justify-end">
                        <button type="submit" class="bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-2 px-6 rounded-lg transition shadow-lg shadow-cyan-900/20">Save Settings</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
